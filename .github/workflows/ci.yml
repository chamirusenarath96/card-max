name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint, type-check, unit tests, build ────────────────────────────────
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit & Component tests
        run: npm run test

      - name: Build
        run: npm run build

  # ── Job 2: Playwright E2E (runs after Job 1 passes) ───────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for E2E server)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Job 3: Deploy to Vercel (push to master only, after CI + E2E pass) ────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: github.event_name == 'push'

    environment:
      name: production
      url: https://card-max.vercel.app

    permissions:
      contents: write  # post commit comment
      issues: write    # create failure issue

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment & config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Promote to production
        run: |
          vercel promote ${{ steps.deploy.outputs.preview_url }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Invalidate ISR cache
        run: |
          STATUS=$(curl -s -o /tmp/revalidate.txt -w "%{http_code}" \
            --max-time 15 -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_REVALIDATION_SECRET }}" \
            https://card-max.vercel.app/api/revalidate)
          echo "Revalidate status: $STATUS"
          cat /tmp/revalidate.txt
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Cache invalidation returned $STATUS — site will refresh within 1 hour"
          fi
        continue-on-error: true

      - name: Comment deploy URL on commit
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Deployed to production**\n\nhttps://card-max.vercel.app\n\nCommit: \`${context.sha.slice(0, 7)}\``,
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Deploy] Production deploy failed - ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Production Deploy Failed',
                '',
                `**Commit:** \`${context.sha.slice(0,7)}\``,
                `**Workflow:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Please investigate and redeploy.',
              ].join('\n'),
              labels: ['bug', 'deploy'],
            });
