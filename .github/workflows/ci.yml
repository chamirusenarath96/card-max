name: CI

on:
  pull_request:
    branches: [main, develop, master]
  push:
    branches: [main, develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint, type-check, unit tests, and build ──────────────────────────
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit & Component tests
        run: npm run test

      - name: Build
        # MONGODB_URI not needed at build time — dbConnect() checks it at
        # request time only, so next build works without a live DB connection.
        run: npm run build

  # ── Job 2: Playwright E2E (runs after Job 1 passes) ─────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    environment: Production  # grants access to Production environment secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Each job runs in a fresh VM — the .next build from the ci job is gone.
      # Rebuild here so `next start` has a production build to serve.
      # No MONGODB_URI needed; dbConnect() only checks it at request time.
      - name: Build (for E2E server)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
