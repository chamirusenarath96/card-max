name: Daily Crawler

on:
  # 2:00 AM Sri Lanka time = 20:30 UTC (Sri Lanka is UTC+5:30)
  schedule:
    - cron: "30 20 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  crawl:
    name: Scrape Bank Offers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        run: npm run crawler
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Crawler] Daily scrape failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The daily crawler job failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'crawler']
            })
