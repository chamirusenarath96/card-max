name: Daily Crawler

on:
  # 2:00 AM Sri Lanka time = 20:30 UTC (Sri Lanka is UTC+5:30)
  schedule:
    - cron: "30 20 * * *"

  # Manual trigger from GitHub Actions UI (useful for one-off scrapes)
  workflow_dispatch:
    inputs:
      revalidate:
        description: "Revalidate Vercel ISR cache after crawl?"
        required: false
        default: "true"
        type: boolean

jobs:
  crawl:
    name: Scrape Bank Offers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        id: crawl
        run: npm run crawler
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      # After new data is written to MongoDB, bust the Vercel ISR cache so
      # users see fresh offers within seconds instead of waiting up to 1 hour.
      - name: Revalidate Vercel ISR cache
        if: success() && (github.event.inputs.revalidate != 'false')
        run: |
          echo "Revalidating ISR cache..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_REVALIDATION_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/revalidate")
          echo "Revalidation HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: revalidation returned $STATUS — cache may be stale"
          fi

      - name: Notify on failure (open GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Crawler] Daily scrape failed — ${today}`,
              body: [
                '## Crawler Failure',
                '',
                `**Date:** ${today}`,
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Checklist',
                '- [ ] Check bank website for layout changes',
                '- [ ] Check MongoDB Atlas connectivity',
                '- [ ] Check for Incapsula/bot-protection blocks on NTB',
                '- [ ] Verify HNB API endpoint is responsive',
                '- [ ] Re-run workflow manually once fixed',
              ].join('\n'),
              labels: ['bug', 'crawler']
            });
