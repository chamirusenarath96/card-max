name: Daily Crawler

on:
  # 2:00 AM Sri Lanka time = 20:30 UTC (Sri Lanka is UTC+5:30)
  schedule:
    - cron: "30 20 * * *"

  # Manual trigger from GitHub Actions UI (useful for one-off scrapes)
  workflow_dispatch:
    inputs:
      revalidate:
        description: "Revalidate Vercel ISR cache after crawl?"
        required: false
        default: "true"
        type: boolean

jobs:
  crawl:
    name: Scrape Bank Offers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production  # grants access to MONGODB_URI and Vercel secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        id: crawl
        run: npm run crawler
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      # After new data is written to MongoDB, bust the Vercel ISR cache so
      # users see fresh offers within seconds instead of waiting up to 1 hour.
      #
      # This step is advisory — a failure here should NOT fail the whole job,
      # since the crawl itself already succeeded. It also skips gracefully when
      # VERCEL_APP_URL / VERCEL_REVALIDATION_SECRET are not yet configured.
      - name: Revalidate Vercel ISR cache
        if: success() && (github.event.inputs.revalidate != 'false')
        continue-on-error: true
        run: |
          if [ -z "$VERCEL_APP_URL" ] || [ -z "$VERCEL_REVALIDATION_SECRET" ]; then
            echo "⚠️  VERCEL_APP_URL or VERCEL_REVALIDATION_SECRET not configured — skipping revalidation."
            exit 0
          fi

          echo "Revalidating ISR cache at ${VERCEL_APP_URL}..."
          STATUS=$(curl -s -o /tmp/revalidate_response.txt -w "%{http_code}" \
            --max-time 15 \
            -X POST \
            -H "Authorization: Bearer ${VERCEL_REVALIDATION_SECRET}" \
            "${VERCEL_APP_URL}/api/revalidate")

          echo "HTTP status: $STATUS"
          cat /tmp/revalidate_response.txt

          if [ "$STATUS" = "200" ]; then
            echo "✅ ISR cache revalidated successfully."
          else
            echo "⚠️  Revalidation returned $STATUS — the cache may serve stale data for up to 1 hour."
          fi
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          VERCEL_REVALIDATION_SECRET: ${{ secrets.VERCEL_REVALIDATION_SECRET }}

      - name: Notify on failure (open GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Crawler] Daily scrape failed — ${today}`,
              body: [
                '## Crawler Failure',
                '',
                `**Date:** ${today}`,
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Checklist',
                '- [ ] Check bank website for layout changes',
                '- [ ] Check MongoDB Atlas connectivity',
                '- [ ] Check for Incapsula/bot-protection blocks on NTB',
                '- [ ] Verify HNB API endpoint is responsive',
                '- [ ] Re-run workflow manually once fixed',
              ].join('\n'),
              labels: ['bug', 'crawler']
            });
